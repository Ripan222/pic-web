<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茁影社近期活动</title>
    <style>
        /* 全局样式 */
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {background: #f8f8f8; padding: 20px; font-family: 微软雅黑;}
        
        /* 图片网格：响应式布局（电脑5列、平板3列、手机2列） */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* 电脑端5列，视觉更合理 */
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 10px;
        }
        
        /* 缩略图样式：完整显示，固定高度 */
        .image-item {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            background-color: #f0f0f0;
        }
        .image-item:hover {transform: scale(1.05);}
        
        /* 预览层样式 */
        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .preview-image {max-width: 90%; max-height: 90%; border-radius: 8px;}
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover {color: #ff6666;}
        
        /* 响应式适配 */
        @media (max-width: 1200px) {.image-grid {grid-template-columns: repeat(8, 1fr);}} /* 平板3列 */
        @media (max-width: 768px) {
            .image-grid {grid-template-columns: repeat(4, 1fr);} /* 手机2列 */
            .image-item {height: 120px;}
        }
    </style>
</head>
<body>
    <!-- 图片网格容器（空的，由JS自动填充） -->
    <div class="image-grid" id="imageGrid"></div>

    <!-- 大图预览层（唯一ID） -->
    <div class="preview-overlay" id="previewOverlay">
        <span class="close-btn" id="closeBtn">&times;</span>
        <img class="preview-image" id="previewImage" src="" alt="大图预览">
    </div>

    <script>
        // ========== 核心：自动读取图片并按文件名排序 ==========
        const imageGrid = document.getElementById('imageGrid');
        // 1. 图片文件名列表（请确保这些图片和当前HTML文件在同一文件夹！）
        const imageFiles = [
         '3.071.jpg',
    '3.081.jpg',
    '3.082.jpg',
    '3.082.png',
    '3.083.jpg',
    '3.084.jpg',
    '3.085.jpg',
    '3.086.jpg',
    '3.087.jpg',
    '3.131.jpg',
    '3.133.jpg',
    '3.134.jpg',
    '3.141.jpg',
    '3.141.png',
    '3.142.jpg',
    '3.143.jpg',
    '3.144.jpg',
    '3.146.jpg',
    '3.147.jpg',
    '3.148.jpg',
    '3.150.jpg',
    '3.151.jpg',
    '3.152.jpg',
    '3.153.jpg',
    '3.154.jpg',
    '3.155.jpg',
    '3.156.jpg',
    '3.157.png',
    '3.158.jpg',
    '3.159.jpg',
    '3.211.jpg',
    '3.212.jpg',
    '3.212.png',
    '3.213.png',
    '3.214.png',
    '3.221.jpg',
    '3.222.jpg',
    '3.223.jpg',
    '3.224.png',
    '3.280.jpg',
    '3.281.jpg',
    '3.282.jpg',
    '3.283.jpg',
    '3.290.jpg',
    '3.291.jpg',
    '3.292.jpg',
    '3.293.jpg',
    '4.04.png',
    '4.05.jpg',
    '4.06.jpg',
    '4.12.jpg'
        ];

        // 2. 按文件名的数字排序（比如3.131 < 3.132 < 3.141）
        imageFiles.sort((a, b) => {
            const numA = parseFloat(a.replace(/[^0-9.]/g, ''));
            const numB = parseFloat(b.replace(/[^0-9.]/g, ''));
            return numA - numB; // 升序排列
        });

        // 3. 自动生成图片标签并添加到页面
        imageFiles.forEach((file, index) => {
            const img = document.createElement('img');
            img.src = file; // 图片路径（同一目录直接写文件名）
            img.alt = `活动海报${index+1}`;
            img.className = 'image-item';
            // 点击预览大图
            img.addEventListener('click', () => {
                document.getElementById('previewImage').src = file;
                document.getElementById('previewOverlay').style.display = 'flex';
            });
            imageGrid.appendChild(img);
        });

        // ========== 预览层关闭逻辑 ==========
        const closeBtn = document.getElementById('closeBtn');
        const previewOverlay = document.getElementById('previewOverlay');
        // 点击×关闭
        closeBtn.addEventListener('click', () => previewOverlay.style.display = 'none');
        // 点击空白处关闭
        previewOverlay.addEventListener('click', (e) => {
            if (e.target === previewOverlay) previewOverlay.style.display = 'none';
        });
        // 按ESC键关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') previewOverlay.style.display = 'none';
        });
    </script>
</body>
</html>

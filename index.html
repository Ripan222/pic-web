<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茁影社近期活动</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {background: #f8f8f8; padding: 20px; font-family: 微软雅黑;}
        .image-grid {display: grid;
    /* 电脑端默认一行5个 */
    grid-template-columns: repeat(8, 1fr);
    gap: 15px; /* 图片之间的间距 */
    max-width: 1400px; /* 网页最大宽度，避免太宽 */
    margin: 0 auto; /* 居中显示 */
    padding: 0 10px; /* 左右留白，适配小屏幕 */;}
        .image-item { width: 100%;
    height: 200px; /* 固定缩略图高度，控制大小 */
    object-fit: contain; /* 完整显示图片，不裁剪 */
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.2s;
    background-color: #f0f0f0; /* 浅灰背景，避免留白突兀 */;}
      .image-item:hover {
    transform: scale(1.05);
}

/* 平板端适配：一行3个 */
@media (max-width: 1200px) {
    .image-grid {
        grid-template-columns: repeat(5, 1fr);
    }
}

/* 手机端适配：一行2个 */
@media (max-width: 768px) {
    .image-grid {
        grid-template-columns: repeat(4, 1fr);
    }
    .image-item {
        height: 150px; /* 手机端缩略图略小，更适配 */
    }
}
        .preview-overlay {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999;}
        .preview-image {max-width: 90%; max-height: 90%; border-radius: 8px;}
        .close-btn {position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer;}
        .close-btn:hover {color: #ff6666;}
    </style>
</head>
<body>
    <div class="image-grid">
        <!-- 👇 这里改图片名，有多少张加多少行 -->
    <img src="img1.jpg" alt="图片1" class="image-item">
    <img src="img2.jpg" alt="图片2" class="image-item">
    <img src="img3.jpg" alt="图片3" class="image-item">
    <img src="img4.jpg" alt="图片4" class="image-item">
    <img src="img5.jpg" alt="图片5" class="image-item">
    <img src="img6.jpg" alt="图片6" class="image-item">
    <img src="img7.jpg" alt="图片7" class="image-item">
    <img src="img8.jpg" alt="图片8" class="image-item">
    <img src="img9.jpg" alt="图片9" class="image-item">
    <img src="img10.jpg" alt="图片10" class="image-item">
    <img src="img11.jpg" alt="图片11" class="image-item">
<img src="img12.jpg" alt="图片12" class="image-item">
        <!-- 继续加：复制上面一行，改数字和后缀，比如 <img src="img5.png" alt="图片5" class="image-item"> -->
    </div>

    <div class="preview-overlay" id="previewOverlay">
        <span class="close-btn" id="closeBtn">&times;</span>
        <img class="preview-image" id="previewImage" src="" alt="大图预览">
    </div>

    <script>
        const imageItems = document.querySelectorAll('.image-item');
        const previewOverlay = document.getElementById('previewOverlay');
        const previewImage = document.getElementById('previewImage');
        const closeBtn = document.getElementById('closeBtn');

        imageItems.forEach(item => {
            item.addEventListener('click', () => {
                previewImage.src = item.src;
                previewOverlay.style.display = 'flex';
            });
        });

        closeBtn.addEventListener('click', () => previewOverlay.style.display = 'none');
        previewOverlay.addEventListener('click', (e) => {if(e.target===previewOverlay) previewOverlay.style.display = 'none';});
        document.addEventListener('keydown', (e) => {if(e.key==='Escape') previewOverlay.style.display = 'none';});
    </script>
</body>
</html>
